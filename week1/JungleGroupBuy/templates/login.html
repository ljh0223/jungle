<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}다모여라{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        jungle: '#1d4ed8',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <!-- main container -->
    <main class="flex-grow flex items-center justify-center px-4 py-16">
        <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-lg">
            <h1 class="text-2xl font-bold mb-6 text-center">로그인</h1>
            <form action="/login" method="POST" class="space-y-6">
                <div>
                    <label for="username" class="block text-gray-700 mb-1">아이디</label>
                    <input type="text" id="username" name="username" required
                        value="{{ username|default('') }}"
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-jungle">
                </div>
                <div>
                    <label for="password" class="block text-gray-700 mb-1">비밀번호</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-jungle">
                </div>
                <button type="submit"
                    class="w-full bg-jungle text-white py-2 rounded-lg hover:bg-blue-700 transition-colors duration-200">
                    로그인
                </button>
            </form>
            <p class="mt-4 text-center text-gray-600">
                계정이 없으신가요?
                <a href="/signup" class="text-jungle hover:underline">회원가입</a>
            </p>
        </div>
    </main>

    <footer class="text-center py-10 text-gray-400">
        © 2026 Jungle Group Buy
    </footer>

    <!-- Flask에서 alert_msg를 전달하는 코드입니당. -->
    {% if alert_msg %}
    <script>
        alert("{{ alert_msg }}");
    </script>
    {% endif %}

</body>
</html>
